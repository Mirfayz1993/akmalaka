name: Test & Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Paketlarni o'rnatish
        run: npm ci

      - name: Testlarni ishlatish
        run: npm run test

      - name: SSH kalitni sozlash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 194.163.157.44 >> ~/.ssh/known_hosts

      - name: VPS da deploy (git pull + deploy.sh)
        run: |
          ssh -i ~/.ssh/deploy_key root@194.163.157.44 \
            "cd /var/www/wood-erp && git pull origin master && bash deploy.sh"
